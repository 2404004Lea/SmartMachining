<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Acceso Admin — Smart Maching</title>
   <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --orange:#e67e22; --bg:#060608; --bg2:#0d1117; --bg3:#0a0d12;
      --border:#1e2530; --text:#f0f2f5; --muted:#5a6a7a; --dim:#2a3545;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient bg */
    .bg-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(230,126,34,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(230,126,34,.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 50%, rgba(230,126,34,.04) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 85% 50%, rgba(100,120,200,.03) 0%, transparent 70%);
    }

    /* Card */
    .login-wrap {
      position: relative; z-index: 1;
      width: min(440px, 94vw);
      animation: slideUp .5s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes slideUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }

    .login-top {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 15px; font-weight: 900; letter-spacing: 4px; color: #fff;
      display: inline-block; margin-bottom: 8px;
    }
    .login-logo span { color: var(--orange); }
    .login-top-label {
      color: var(--dim); font-size: 9px; font-family: 'Orbitron', sans-serif;
      letter-spacing: 4px; margin-top: 6px;
    }

    .login-card {
      background: rgba(13,17,23,.9);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      box-shadow: 0 40px 80px rgba(0,0,0,.7);
      backdrop-filter: blur(12px);
      position: relative;
    }

    /* top accent line */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }

    .login-header {
      padding: 36px 40px 28px;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .login-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem; font-weight: 700; letter-spacing: 3px; color: var(--text);
      margin-bottom: 6px;
    }
    .login-header p {
      font-size: 13px; color: var(--muted); line-height: 1.6;
    }

    .login-body { padding: 32px 40px 36px; display: flex; flex-direction: column; gap: 20px; }

    .field { display: flex; flex-direction: column; gap: 7px; }
    .field label {
      font-family: 'Orbitron', sans-serif;
      font-size: 9px; font-weight: 700; letter-spacing: 3px;
      color: var(--dim); text-transform: uppercase;
    }
    .field-input-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
      color: var(--dim); font-size: 14px; pointer-events: none;
    }
    .field input {
      width: 100%;
      background: rgba(255,255,255,.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--text);
      padding: 13px 16px 13px 44px;
      font-size: 14px; font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    .field input::placeholder { color: #2a3545; }
    .field input:focus {
      border-color: var(--orange);
      background: rgba(230,126,34,.04);
    }

    /* Error */
    .error-msg {
      display: none;
      background: rgba(192,57,43,.12);
      border: 1px solid rgba(192,57,43,.3);
      border-radius: 3px;
      padding: 12px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px; letter-spacing: 1.5px; color: #e05555;
    }
    .error-msg.show { display: block; animation: fadeIn .2s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .btn-login {
      width: 100%;
      background: var(--orange); color: #fff; border: none;
      padding: 14px; font-size: 11px; font-weight: 700; letter-spacing: 3px;
      cursor: pointer; font-family: 'Orbitron', sans-serif; border-radius: 3px;
      text-transform: uppercase; position: relative; overflow: hidden;
      transition: opacity .2s; margin-top: 4px;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .btn-login .btn-spinner {
      display: none; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-spinner { display: block; }

    .login-footer {
      padding: 18px 40px; border-top: 1px solid rgba(255,255,255,.04);
      display: flex; justify-content: space-between; align-items: center;
    }
    .login-footer a {
      font-size: 12px; color: var(--muted); text-decoration: none;
      font-family: 'Syne', sans-serif; transition: color .2s;
    }
    .login-footer a:hover { color: #c0d0e0; }
    .login-ver {
      font-family: 'Orbitron', sans-serif; font-size: 9px;
      color: #1e2530; letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="login-wrap">
  <div class="login-top">
    <div class="login-logo">SMART <span>MACHING</span></div>
    <div class="login-top-label">PANEL DE ADMINISTRACIÓN</div>
  </div>

  <div class="login-card">
    <div class="login-header">
      <h1>ACCESO RESTRINGIDO</h1>
      <p>Ingresa tus credenciales de administrador para continuar.</p>
    </div>

    <div class="login-body">
      <div class="error-msg" id="errorMsg">⚠ &nbsp;Usuario o contraseña incorrectos</div>

      <div class="field">
        <label>Usuario</label>
        <div class="field-input-wrap">
          <span class="field-icon">◈</span>
          <input type="text" id="username" placeholder="tu_usuario" autocomplete="username" autofocus/>
        </div>
      </div>

      <div class="field">
        <label>Contraseña</label>
        <div class="field-input-wrap">
          <span class="field-icon">◉</span>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="doLogin()">
        <span class="btn-text">INGRESAR AL SISTEMA →</span>
        <div class="btn-spinner"></div>
      </button>
    </div>

    <div class="login-footer">
      <a href="../html/catalogo.html">← Volver al catálogo</a>
      <span class="login-ver">v1.0.0</span>
    </div>
  </div>
</div>

<script>
  // Verificar si ya hay sesión activa
  fetch('api.php?action=me')
    .then(r => r.json())
    .then(res => { if (res.ok) window.location.href = 'admin.php'; })
    .catch(() => {});

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const btn      = document.getElementById('btnLogin');
    const errEl    = document.getElementById('errorMsg');

    if (!username || !password) {
      errEl.textContent = '⚠  Completa todos los campos.';
      errEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');
    btn.disabled = true;
    errEl.classList.remove('show');

    try {
      const res  = await fetch('api.php?action=login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (data.ok) {
        window.location.href = 'admin.php';
      } else {
        errEl.textContent = '⚠  ' + (data.error || 'Credenciales incorrectas.');
        errEl.classList.add('show');
      }
    } catch {
      errEl.textContent = '⚠  No se pudo conectar al servidor.';
      errEl.classList.add('show');
    }

    btn.classList.remove('loading');
    btn.disabled = false;
  }

  // Enter key
  ['username','password'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );
</script>
</body>
</html>
